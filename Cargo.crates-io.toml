# crates.io distribution manifest.
#
# DeepFilterNet 0.5.6 is not published on crates.io, so registry releases
# contain the classical DSP and RNNoise backends. The unreleased AAC encoder is
# also excluded; AAC/M4A decoding remains available. GitHub release binaries
# are built from Cargo.toml with all backends and encoders enabled.

[package]
name = "denoize"
version = "0.5.4"
edition = "2021"
rust-version = "1.85"
authors = ["KAORU <133386210+penguin425@users.noreply.github.com>"]
description = "Pure-Rust audio denoiser with classical DSP and optional RNNoise"
license = "MIT"
readme = "README.md"
repository = "https://github.com/penguin425/denoize"
homepage = "https://github.com/penguin425/denoize"
documentation = "https://docs.rs/denoize"
keywords = ["audio", "denoise", "dsp", "stft", "noise-reduction"]
categories = ["multimedia::audio", "science"]
include = [
    "Cargo.toml",
    "Cargo.crates-io.toml",
    "Cargo.lock",
    "LICENSE",
    "README.md",
    "THIRD_PARTY.md",
    "src/**/*.rs",
    "examples/**/*.rs",
    "scripts/export-mpsenet.py",
    "scripts/validate-mpsenet.py",
    "scripts/export-bsrnn.py",
    "scripts/export-mossformer2.py",
    "scripts/validate-mossformer2.py",
    "scripts/validate-bsrnn.py",
    "scripts/export-sgmse.py",
    "scripts/validate-sgmse.py",
    "scripts/generate-cli-docs.sh",
    "docs/cli.md",
]

[lib]
name = "denoize"
path = "src/lib.rs"

[[bin]]
name = "denoize"
path = "src/main.rs"

[dependencies]
hound = "3.5"
claxon = "0.4.3"
flacenc = "0.5.1"
ogg = "0.9.2"
opus = "0.3.1"
nnnoiseless = { version = "0.5.2", optional = true, default-features = false }
nanomp3 = "0.1.1"
shine-rs = "0.1.3"
oxideav-aac = "0.1.6"
mp4 = "0.14.0"
rubato = "0.16.2"
rayon = "1.11.0"
ebur128 = "0.1.10"
lofty = "0.24.0"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
ctrlc = "3.4.5"
sha2 = "0.10.9"
ureq = { version = "2.12.1", features = ["tls"] }
tract-onnx = { version = "0.22.3", optional = true }
rustfft = { version = "6.4", optional = true }
kaldi-native-fbank = { version = "0.1.0", optional = true }

[features]
default = []
rnnoise = ["dep:nnnoiseless"]
onnx = ["dep:tract-onnx"]
mpsenet = ["onnx", "dep:rustfft"]
bsrnn = ["onnx", "dep:rustfft"]
mossformer2 = ["onnx", "dep:rustfft", "dep:kaldi-native-fbank"]
sgmse = ["onnx", "dep:rustfft"]
gtcrn = ["onnx", "dep:rustfft"]
full = ["rnnoise", "onnx", "mpsenet", "bsrnn", "mossformer2", "sgmse", "gtcrn"]

[dev-dependencies]
prost = "0.11"

[package.metadata.docs.rs]
features = ["rnnoise", "mpsenet", "bsrnn", "mossformer2", "sgmse", "gtcrn"]
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(feature, values("deepfilter", "live", "m4a-encode", "fdk-aac-encoder", "onnx", "mpsenet", "bsrnn", "mossformer2", "sgmse", "gtcrn"))',
] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 1
